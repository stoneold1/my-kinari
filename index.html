<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MŪMBI — Sacred Flame</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1e1208; --glass: rgba(80, 48, 14, 0.45); --glass-border: rgba(212, 170, 78, 0.32);
    --text: #f5eedc; --accent: #d4aa4e; --accent-glow: rgba(212, 170, 78, 0.3);
    --send-bg: linear-gradient(140deg, #d4aa4e 0%, #f07840 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

  /* AMBIENT LIGHTS */
  .orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.3; pointer-events: none; }

  /* GATEKEEPER */
  #api-gate {
    position: fixed; inset: 0; background: var(--bg); z-index: 9999;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(20px);
  }
  .gate-box {
    background: var(--glass); border: 1px solid var(--glass-border); padding: 40px; 
    border-radius: 24px; text-align: center; width: 90%; max-width: 400px;
  }
  .gate-box h2 { font-family: 'Cinzel Decorative', serif; color: var(--accent); margin-bottom: 20px; }
  .gate-box input {
    width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
    padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; outline: none; text-align: center;
  }
  .gate-box button {
    background: var(--send-bg); border: none; color: white; padding: 12px 40px; border-radius: 30px; cursor: pointer;
  }

  /* CHAT UI */
  #main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; }
  .messages-inner { max-width: 800px; margin: 0 auto; }
  
  .bubble-wrap { margin-bottom: 20px; display: flex; flex-direction: column; }
  .bubble { padding: 15px 20px; border-radius: 18px; max-width: 85%; line-height: 1.6; }
  .user { align-self: flex-end; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); }
  .assistant { align-self: flex-start; border-left: 2px solid var(--accent); color: var(--text); }

  #input-wrap { padding: 20px; }
  #input-box { 
    display: flex; background: var(--glass); border-radius: 34px; padding: 10px 20px;
    border: 1px solid var(--glass-border); max-width: 800px; margin: 0 auto;
  }
  textarea { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; resize: none; font-size: 16px; }
  #send-btn { background: var(--send-bg); border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; color: white; }
</style>
</head>
<body>

<div class="orb" style="width:400px;height:400px;top:-100px;left:-100px;background:#c9852a;"></div>
<div class="orb" style="width:300px;height:300px;bottom:-50px;right:-50px;background:#f07840;"></div>

<div id="api-gate">
  <div class="gate-box">
    <h2>MŪMBI</h2>
    <p style="margin-bottom: 20px; opacity: 0.7;">Enter your Groq API Key</p>
    <input type="password" id="api-input" placeholder="gsk_...">
    <button onclick="saveApiKey()">AWAKEN</button>
  </div>
</div>

<div id="main">
  <div id="messages"><div class="messages-inner" id="chat-target"></div></div>
  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Whisper..."></textarea>
      <button id="send-btn" onclick="handleSend()">➔</button>
    </div>
  </div>
</div>

<script>
// --- DATA FIXER (Solves the 'role' error) ---
function getCleanHistory() {
    let raw = JSON.parse(localStorage.getItem('Kinari_v12')) || [];
    return raw.map(m => {
        // If the role isn't 'user' or 'system', it MUST be 'assistant'
        if (m.role !== 'user' && m.role !== 'system') {
            return { ...m, role: 'assistant' };
        }
        return m;
    });
}

let USER_API_KEY = localStorage.getItem('KINARI_KEY');
let chatHistory = getCleanHistory();
const gate = document.getElementById('api-gate');

// Force display check
if (!USER_API_KEY || USER_API_KEY === "null") {
    gate.style.display = 'flex';
}

function saveApiKey() {
    const val = document.getElementById('api-input').value.trim();
    if (val.startsWith('gsk_')) {
        localStorage.setItem('KINARI_KEY', val);
        location.reload();
    } else {
        alert("Invalid Key Format");
    }
}

async function handleSend() {
    const inputEl = document.getElementById('user-input');
    const text = inputEl.value.trim();
    if (!text || !USER_API_KEY) return;

    chatHistory.push({ role: 'user', content: text });
    inputEl.value = '';
    render();

    try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${USER_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: 'system', content: "You are Mumbi. Speak in short, cryptic, poetic verses." },
                    ...chatHistory
                ]
            })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        // Store explicitly as 'assistant'
        chatHistory.push({ role: 'assistant', content: data.choices[0].message.content });
        localStorage.setItem('Kinari_v12', JSON.stringify(chatHistory));
        render();

    } catch (e) {
        alert("Flame Flickered: " + e.message);
        // If the error is about 'role', wipe history and start over
        if (e.message.includes("role")) {
            localStorage.removeItem('Kinari_v12');
            location.reload();
        }
    }
}

function render() {
    const target = document.getElementById('chat-target');
    target.innerHTML = chatHistory.map(m => `
        <div class="bubble-wrap">
            <div class="bubble ${m.role}">
                ${m.role === 'assistant' ? marked.parse(m.content) : m.content}
            </div>
        </div>
    `).join('');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

render();
</script>
</body>
</html>
