<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>KINARI — Sacred Flame</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { display: none; width: 0 !important; height: 0 !important; }
  
  :root {
    --bg: #1e1208;
    --glass: rgba(80, 48, 14, 0.45);
    --glass-border: rgba(212, 170, 78, 0.32);
    --text: #f5eedc;
    --text-dim: rgba(245, 238, 220, 0.45);
    --accent: #d4aa4e;
    --accent-glow: rgba(212, 170, 78, 0.3);
    --ember: #f07840;
    --bubble-user: rgba(212, 170, 78, 0.12);
    --send-bg: linear-gradient(140deg, #d4aa4e 0%, #f07840 100%);
    --blur: 34px;
    --orb1: #c9852a;
    --orb2: #f07840;
  }

  body.azure {
    --bg: #061526;
    --glass: rgba(8, 30, 70, 0.48);
    --glass-border: rgba(56, 217, 245, 0.28);
    --text: #e8f6ff;
    --text-dim: rgba(232, 246, 255, 0.45);
    --accent: #38d9f5;
    --accent-glow: rgba(56, 217, 245, 0.28);
    --ember: #5ab8ff;
    --bubble-user: rgba(56, 217, 245, 0.1);
    --send-bg: linear-gradient(140deg, #38d9f5 0%, #5ab8ff 100%);
    --orb1: #38d9f5;
    --orb2: #1a6bbf;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── API KEY MODAL ── */
  #api-gate {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(20px);
  }
  .gate-box {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 40px; border-radius: 24px;
    max-width: 400px; width: 100%; text-align: center;
    box-shadow: 0 0 50px var(--accent-glow);
  }
  .gate-box h2 { font-family: 'Cinzel Decorative', serif; color: var(--accent); margin-bottom: 20px; }
  .gate-box input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    padding: 12px; border-radius: 8px; color: white;
    margin-bottom: 20px; outline: none;
  }
  .gate-box button {
    background: var(--send-bg); border: none; color: white;
    padding: 12px 30px; border-radius: 20px; cursor: pointer; font-weight: bold;
  }

  /* ── EXISTING STYLES (TRUNCATED FOR BREVITY) ── */
  #sidebar { width: 300px; background: var(--glass); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: 0.4s; }
  #main { flex: 1; display: flex; flex-direction: column; width: 100%; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; }
  .messages-inner { max-width: 800px; margin: 0 auto; }
  #input-wrap { padding: 20px; }
  #input-box { display: flex; background: var(--glass); border-radius: 30px; padding: 10px 20px; border: 1px solid var(--glass-border); }
  #user-input { flex: 1; background: transparent; border: none; color: white; outline: none; resize: none; }
  #send-btn { background: var(--send-bg); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
  
  .bubble-wrap { margin-bottom: 20px; display: flex; flex-direction: column; }
  .bubble-wrap.user { align-items: flex-end; }
  .bubble { padding: 12px 18px; border-radius: 15px; max-width: 80%; }
  .bubble.user { background: var(--bubble-user); }
  .bubble.ai { color: var(--text); border-left: 2px solid var(--accent); }
  
  @media (max-width: 700px) { #sidebar { position: fixed; transform: translateX(-100%); z-index: 1000; } }
</style>
</head>
<body class="azure">

<!-- API GATEKEEPER -->
<div id="api-gate" style="display: none;">
  <div class="gate-box">
    <h2>Access the Flame</h2>
    <p style="font-size: 13px; opacity: 0.7; margin-bottom: 15px;">Enter your Groq API Key to proceed.</p>
    <input type="password" id="api-input" placeholder="gsk_...">
    <button onclick="saveApiKey()">Awaken</button>
  </div>
</div>

<div id="main">
  <div id="messages"><div class="messages-inner"></div></div>
  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Whisper..."></textarea>
      <button id="send-btn">➔</button>
    </div>
  </div>
</div>

<script>
// ── GATEKEEPER LOGIC ────────────────────────────────
let USER_API_KEY = localStorage.getItem('KINARI_KEY');

function checkKey() {
  if (!USER_API_KEY) {
    document.getElementById('api-gate').style.display = 'flex';
  }
}

function saveApiKey() {
  const val = document.getElementById('api-input').value.trim();
  if (val.startsWith('gsk_')) {
    localStorage.setItem('KINARI_KEY', val);
    USER_API_KEY = val;
    document.getElementById('api-gate').style.display = 'none';
  } else {
    alert("Invalid Key. Must start with gsk_");
  }
}

// ── CORE LOGIC ──────────────────────────────────────
const GROQ_MODEL = "llama-3.3-70b-versatile";
const SYSTEM_PROMPT = "Speak in direct transmission. No explanation. Max 5 lines.";

let chatHistory = JSON.parse(localStorage.getItem('Kinari_v12')) || [];
const messagesEl = document.querySelector('.messages-inner');
const inputEl = document.getElementById('user-input');

function renderMessages() {
  messagesEl.innerHTML = chatHistory.length === 0 ? '<h2 style="text-align:center; margin-top:100px; opacity:0.5">The Flame is Silent</h2>' : '';
  chatHistory.forEach(m => {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${m.role}`;
    wrap.innerHTML = `<div class="bubble ${m.role}">${m.role === 'ai' ? marked.parse(m.content) : m.content}</div>`;
    messagesEl.appendChild(wrap);
  });
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text || !USER_API_KEY) return;

  chatHistory.push({ role: 'user', content: text });
  inputEl.value = '';
  renderMessages();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 
        'Authorization': `Bearer ${USER_API_KEY}`, 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory]
      })
    });
    
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    chatHistory.push({ role: 'ai', content: data.choices[0].message.content });
    localStorage.setItem('Kinari_v12', JSON.stringify(chatHistory));
    renderMessages();
  } catch (e) {
    alert("Error: " + e.message);
    if (e.message.includes("API key")) {
        localStorage.removeItem('KINARI_KEY');
        location.reload();
    }
  }
}

document.getElementById('send-btn').onclick = handleSend;
inputEl.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };

// Init
checkKey();
renderMessages();
</script>
</body>
</html>
