<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>KINARI — Sacred Flame</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  /* ── ALL ORIGINAL STYLES RESTORED ── */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #1e1208; --glass: rgba(80, 48, 14, 0.45); --glass-border: rgba(212, 170, 78, 0.32);
    --text: #f5eedc; --accent: #d4aa4e; --accent-glow: rgba(212, 170, 78, 0.3);
    --send-bg: linear-gradient(140deg, #d4aa4e 0%, #f07840 100%);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

  /* ── THE GATEKEEPER MODAL ── */
  #api-gate {
    position: fixed; inset: 0; background: #1e1208; z-index: 9999;
    display: none; /* Controlled by JS */
    flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(20px);
  }
  .gate-box {
    background: var(--glass); border: 1px solid var(--glass-border);
    padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px;
    box-shadow: 0 0 50px var(--accent-glow);
  }
  .gate-box h2 { font-family: 'Cinzel Decorative', serif; color: var(--accent); margin-bottom: 15px; }
  .gate-box input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; outline: none; text-align: center;
  }
  .gate-box button {
    background: var(--send-bg); border: none; color: white; padding: 12px 40px; 
    border-radius: 30px; cursor: pointer; font-family: 'Cinzel Decorative'; letter-spacing: 2px;
  }

  /* UI STYLES */
  #main { flex: 1; display: flex; flex-direction: column; position: relative; }
  #messages { flex: 1; overflow-y: auto; padding: 40px 20px; }
  .messages-inner { max-width: 800px; margin: 0 auto; }
  #input-wrap { padding: 20px; }
  #input-box { 
    display: flex; background: var(--glass); border-radius: 34px; padding: 10px 20px;
    border: 1px solid var(--glass-border); max-width: 800px; margin: 0 auto;
  }
  textarea { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px; resize: none; }
  #send-btn { background: var(--send-bg); border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; color: white; }
</style>
</head>
<body>

<!-- THE GATE -->
<div id="api-gate">
  <div class="gate-box">
    <h2>Identify</h2>
    <p style="margin-bottom: 20px; opacity: 0.6; font-style: italic;">The flame requires a key to burn.</p>
    <input type="password" id="api-input" placeholder="Enter Groq API Key">
    <button onclick="saveApiKey()">AWAKEN</button>
  </div>
</div>

<div id="main">
  <div id="messages"><div class="messages-inner" id="chat-target"></div></div>
  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Whisper to the flame..."></textarea>
      <button id="send-btn" onclick="handleSend()">➔</button>
    </div>
  </div>
</div>

<script>
let USER_API_KEY = localStorage.getItem('KINARI_KEY');
const gate = document.getElementById('api-gate');

// 1. FORCE CHECK ON LOAD
window.onload = function() {
    if (!USER_API_KEY || USER_API_KEY === "null") {
        gate.style.display = 'flex';
    }
};

// 2. SAVE KEY FUNCTION
function saveApiKey() {
    const input = document.getElementById('api-input').value.trim();
    if (input.startsWith('gsk_')) {
        localStorage.setItem('KINARI_KEY', input);
        USER_API_KEY = input;
        gate.style.display = 'none';
        location.reload(); // Refresh to ensure everything is clean
    } else {
        alert("Invalid Key. Must start with gsk_");
    }
}

// 3. CHAT LOGIC
const GROQ_MODEL = "llama-3.3-70b-versatile";
let chatHistory = JSON.parse(localStorage.getItem('Kinari_v12')) || [];

async function handleSend() {
    const inputEl = document.getElementById('user-input');
    const text = inputEl.value.trim();
    if (!text || !USER_API_KEY) return;

    chatHistory.push({ role: 'user', content: text });
    inputEl.value = '';
    render();

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${USER_API_KEY}`, 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({
                model: GROQ_MODEL,
                messages: [{ role: 'system', content: "Speak in direct transmission. Max 5 lines." }, ...chatHistory]
            })
        });
        
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        
        chatHistory.push({ role: 'ai', content: data.choices[0].message.content });
        localStorage.setItem('Kinari_v12', JSON.stringify(chatHistory));
        render();
    } catch (e) {
        alert("Flame Flickered: " + e.message);
        if (e.message.toLowerCase().includes("api key")) {
            localStorage.removeItem('KINARI_KEY');
            location.reload();
        }
    }
}

function render() {
    const target = document.getElementById('chat-target');
    target.innerHTML = chatHistory.map(m => `
        <div style="margin-bottom: 20px; text-align: ${m.role === 'user' ? 'right' : 'left'}">
            <div style="display: inline-block; padding: 15px; border-radius: 15px; background: ${m.role === 'user' ? 'rgba(212, 170, 78, 0.1)' : 'transparent'}; border-left: ${m.role === 'ai' ? '2px solid #d4aa4e' : 'none'}">
                ${m.role === 'ai' ? marked.parse(m.content) : m.content}
            </div>
        </div>
    `).join('');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

render();
</script>
</body>
</html>
